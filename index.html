<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three Months With You</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Poppins:wght@400;500;600&display=swap');

  :root{
    --linen:#F7EFE6;
    --card:#FFFDFB;
    --rose:#D88C9A;
    --plum:#4A2C3A;
    --gold:#C9A66B;
    --sage:#A8B89F;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:var(--linen);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(216,140,154,0.07), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(168,184,159,0.08), transparent 45%);
    font-family:'Lora', serif;
    color:var(--plum);
    min-height:100vh;
  }

  /* ---------- screens ---------- */
  .screen{ display:none; }
  .screen.active{ display:block; }

  /* ================= BOARD SCREEN ================= */

  .board-header{
    text-align:center;
    padding:56px 20px 24px;
  }
  .board-header .eyebrow{
    font-family:'Poppins', sans-serif;
    font-size:12px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--rose);
    margin:0 0 10px;
  }
  .board-header h1{
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:64px;
    margin:0;
    line-height:1;
  }
  .board-header p.sub{
    font-style:italic;
    color:#7a5a68;
    margin:10px 0 0;
    font-size:15px;
  }

  .board-grid{
    column-count:3;
    column-gap:26px;
    max-width:1100px;
    margin:0 auto;
    padding:10px 28px 80px;
  }
  @media (max-width:900px){ .board-grid{ column-count:2; } }
  @media (max-width:560px){ .board-grid{ column-count:1; padding:10px 18px 60px; } }

  .pin{
    background:var(--card);
    border-radius:3px;
    box-shadow:0 10px 22px -10px rgba(74,44,58,0.35), 0 2px 6px rgba(74,44,58,0.08);
    margin:0 0 26px;
    padding:18px 18px 22px;
    break-inside:avoid;
    position:relative;
    transition:transform .25s ease, box-shadow .25s ease;
    opacity:0;
    animation:rise .6s ease forwards;
  }
  .pin:hover{
    transform:rotate(0deg) scale(1.025) !important;
    box-shadow:0 16px 30px -12px rgba(74,44,58,0.4), 0 4px 10px rgba(74,44,58,0.1);
    z-index:2;
  }
  .pin::before{
    content:"";
    position:absolute;
    top:-7px; left:50%;
    width:13px; height:13px;
    margin-left:-6.5px;
    background:radial-gradient(circle at 30% 30%, #e3c08a, var(--gold));
    border-radius:50%;
    box-shadow:0 3px 4px rgba(0,0,0,0.25);
  }

  .tilt-1{ transform:rotate(-2.2deg); }
  .tilt-2{ transform:rotate(1.6deg); }
  .tilt-3{ transform:rotate(-1deg); }
  .tilt-4{ transform:rotate(2deg); }

  .pin:nth-child(1){ animation-delay:.05s; }
  .pin:nth-child(2){ animation-delay:.15s; }
  .pin:nth-child(3){ animation-delay:.25s; }
  .pin:nth-child(4){ animation-delay:.35s; }
  .pin:nth-child(5){ animation-delay:.45s; }
  .pin:nth-child(6){ animation-delay:.55s; }
  .pin:nth-child(7){ animation-delay:.65s; }
  .pin:nth-child(8){ animation-delay:.75s; }

  @keyframes rise{
    from{ opacity:0; transform:translateY(18px) rotate(0deg); }
    to{ opacity:1; }
  }

  /* photo pins */
  .photo-frame{
    position:relative;
    overflow:hidden;
    border-radius:2px;
    background:#eee;
    aspect-ratio:4/5;
  }
  .photo-frame img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .photo-frame.broken img{ display:none; }
  .photo-fallback{
    display:none;
    position:absolute; inset:0;
    align-items:center; justify-content:center;
    flex-direction:column;
    gap:6px;
    background:linear-gradient(135deg, #f1e3da, #e9d3cf);
    font-family:'Poppins', sans-serif;
    font-size:12px;
    color:#9c7d72;
    text-align:center;
    padding:10px;
  }
  .photo-fallback span{ font-size:26px; }
  .photo-frame.broken .photo-fallback{ display:flex; }

  /* flip card for photo backstories */
  .flip-card{
    cursor:pointer;
    perspective:1200px;
  }
  .flip-inner{
    position:relative;
    width:100%;
    aspect-ratio:4/5;
    transition:transform .6s cubic-bezier(.4,.2,.2,1);
    transform-style:preserve-3d;
  }
  .flip-card.flipped .flip-inner{ transform:rotateY(180deg); }
  .flip-front, .flip-back{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:2px;
    overflow:hidden;
  }
  .flip-front .photo-frame{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    aspect-ratio:unset;
  }
  .flip-back{
    transform:rotateY(180deg);
    background:linear-gradient(160deg, #fbeee2, #f1ded3);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    text-align:center;
  }
  .flip-back p{
    font-family:'Caveat', cursive;
    font-size:21px;
    line-height:1.35;
    color:var(--plum);
    margin:0;
  }
  .flip-hint{
    font-family:'Poppins', sans-serif;
    font-size:9px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#b08a95;
    text-align:center;
    margin:6px 0 0;
    opacity:0.85;
  }

  /* things I love about you pin */
  .love-pin .love-list{
    list-style:none;
    margin:0;
    padding:0;
    text-align:left;
  }
