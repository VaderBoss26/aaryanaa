<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three Months With You</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Poppins:wght@400;500;600&display=swap');

  :root{
    --linen:#F7EFE6;
    --card:#FFFDFB;
    --rose:#D88C9A;
    --plum:#4A2C3A;
    --gold:#C9A66B;
    --sage:#A8B89F;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:var(--linen);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(216,140,154,0.07), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(168,184,159,0.08), transparent 45%);
    font-family:'Lora', serif;
    color:var(--plum);
    min-height:100vh;
  }

  /* ---------- screens ---------- */
  .screen{ display:none; }
  .screen.active{ display:block; }

  /* ================= BOARD SCREEN ================= */

  .board-header{
    text-align:center;
    padding:56px 20px 24px;
  }
  .board-header .eyebrow{
    font-family:'Poppins', sans-serif;
    font-size:12px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--rose);
    margin:0 0 10px;
  }
  .board-header h1{
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:64px;
    margin:0;
    line-height:1;
  }
  .board-header p.sub{
    font-style:italic;
    color:#7a5a68;
    margin:10px 0 0;
    font-size:15px;
  }

  .board-grid{
    column-count:3;
    column-gap:26px;
    max-width:1100px;
    margin:0 auto;
    padding:10px 28px 80px;
  }
  @media (max-width:900px){ .board-grid{ column-count:2; } }
  @media (max-width:560px){ .board-grid{ column-count:1; padding:10px 18px 60px; } }
